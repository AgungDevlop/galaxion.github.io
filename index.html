<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Video</title>

    <!-- Include Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body,
        h1,
        h2 {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-black {
            background-color: #000000;
        }

        .text-white {
            color: #ffffff;
        }

        .btn-share {
            background-color: #4f46e5;
            color: white;
        }

        .btn-share:hover {
            background-color: #4338ca;
        }

        .pagination {
            margin-top: 20px;
        }

        .pagination button {
            margin-right: 10px;
        }

        .error-message {
            color: red;
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
        }

        .centered-download {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }
    </style>
</head>

<body class="bg-black text-white p-2">

<header class="w-full bg-gray-800 text-center p-4">
    <h1 id="title" class="text-4xl font-bold mb-6">Simontok 2024</h1>
</header>

<!-- Main Content -->
<main class="container mx-auto mt-8 p-2 bg-gray-900 rounded shadow-lg">
    <div class="aspect-w-16 aspect-h-9">
        <h1 id="videoTitle" class="text-2xl mt-8 font-bold">Video Title</h1>
        <video id="video-id" class="w-full h-full" controls preload="metadata" allowfullscreen>
            <source id="playVideo" type="video/mp4" />
        </video>
        <div id="errorMessage" class="error-message hidden">Error</div>
    </div>

    <!-- Input URL and Share Button -->
    <div class="flex items-center mt-4">
        <input id="videoUrl" type="text" class="border rounded w-full py-2 px-3 bg-gray-800 text-white" value="https://doobs.my.id/#/randomId" readonly />
        <button id="shareButton" class="ml-2 btn-share rounded px-4 py-2 hover:bg-indigo-600 transition">
            <i class="fas fa-share-alt"></i>
        </button>
    </div>

    <!-- Centered Download Button -->
    <div class="centered-download">
        <button id="downloadButton" class="bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition w-full text-center">Download Video</button>
    </div>
</main>

<footer class="bg-gray-800 mt-3 text-white p-4 text-center fixed bottom-0 left-0 w-full">
    <p id="copyrightText" class="text-sm">
        ©Copyright By Simontok Indo 2024
    </p>
</footer>

<!-- Plyr JS -->
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script type="module">
    const apiUrl = 'https://raw.githubusercontent.com/AgungDevlop/Viral/main/Video.json';

    const videoUrl = sessionStorage.getItem('videoUrl');
    const videoTitle = sessionStorage.getItem('videoTitle');
    if (videoUrl) {
        const videoPlayer = document.getElementById('playVideo');
        videoPlayer.src = videoUrl;
        videoPlayer.addEventListener('loadedmetadata', function () {
            videoPlayer.play();
        });
        videoPlayer.addEventListener('error', function () {
            document.getElementById('errorMessage').classList.remove('hidden');
            videoPlayer.classList.add('hidden'); // Hide the video element
        });
        document.getElementById('videoTitle').innerText = videoTitle;
    } else {
        console.error('No video URL found in sessionStorage');
    }

    fetch(apiUrl)
        .then(response => response.json())
        .then(videos => {
            processVideoFromRandomId(videos);
        })
        .catch(error => {
            console.error('Error:', error);
        });

    function processVideoFromRandomId(videos) {
        const randomId = getRandomIdFromUrl();
        const mainElement = document.querySelector('main.container');

        if (randomId) {
            const video = videos.find(video => video.id === randomId);

            if (video) {
                mainElement.innerHTML = '';
                const containerDiv = document.createElement('div');
                containerDiv.className = 'aspect-w-16 aspect-h-9';

                const titleElement = document.createElement('h1');
                titleElement.id = 'videoTitle';
                titleElement.className = 'text-2xl mt-8 font-bold';
                titleElement.innerText = video.Judul;

                const videoElement = document.createElement('video');
                videoElement.id = 'video-id';
                videoElement.className = 'w-full h-full plyr';
                videoElement.controls = true;
                videoElement.preload = 'metadata';
                videoElement.allowFullscreen = true;

                const sourceElement = document.createElement('source');
                sourceElement.id = 'playVideo';
                sourceElement.type = 'video/mp4';
                sourceElement.src = video.Url;

                videoElement.appendChild(sourceElement);
                containerDiv.appendChild(titleElement);
                containerDiv.appendChild(videoElement);
                const errorMessage = document.createElement('div');
                errorMessage.id = 'errorMessage';
                errorMessage.className = 'error-message hidden';
                errorMessage.innerText = 'Error';
                containerDiv.appendChild(errorMessage);
                mainElement.appendChild(containerDiv);

                // Initialize Plyr
                const player = new Plyr(videoElement, {
                    autoplay: false,
                    muted: true,
                    controls: ['play', 'progress', 'current-time', 'mute', 'fullscreen'],
                });

                // Set download button functionality
                const downloadButton = document.getElementById('downloadButton');
                downloadButton.onclick = function () {
                    sessionStorage.setItem('dwn', video.Url); // Save video URL to sessionStorage
                    window.location.href = '/download.html'; // Navigate to download.html
                };

                // Update URL input field
                const urlInput = document.getElementById('videoUrl');
                urlInput.value = `https://doobs.my.id/#/${video.id}`; // Update with actual randomId

                // Update share button data
                const shareButton = document.getElementById('shareButton');
                shareButton.onclick = function () {
                    const shareData = {
                        title: video.Judul,
                        text: `Tonton video viral ${video.Judul} terbaru`,
                        url: urlInput.value
                    };

                    if (navigator.share) {
                        navigator.share(shareData)
                            .then(() => {
                                Swal.fire({
                                    icon: 'success',
                                    title: 'Berhasil Membagikan!',
                                    text: 'Link telah dibagikan ke aplikasi sosial.',
                                    confirmButtonText: 'OK'
                                });
                            })
                            .catch((error) => {
                                console.error('Error sharing:', error);
                            });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Berbagi tidak didukung',
                            text: 'Fitur berbagi tidak didukung di browser ini.',
                            confirmButtonText: 'OK'
                        });
                    }
                };

                videoElement.addEventListener('loadedmetadata', function () {
                    player.play();
                });

                videoElement.addEventListener('error', function () {
                    document.getElementById('errorMessage').classList.remove('hidden');
                    videoElement.classList.add('hidden'); // Hide the video element
                });
            } else {
                console.error('Video not found for the given randomId.');
                mainElement.style.display = 'none';
            }
        } else {
            console.error('Random ID not found in URL.');
            mainElement.style.display = 'none';
        }
    }

    function getRandomIdFromUrl() {
        const hash = window.location.hash;
        return hash.startsWith('#/') ? hash.substring(2) : null;
    }

    const currentYear = new Date().getFullYear();
    document.getElementById('copyrightText').innerText = `©Copyright By Simontok Indo ${currentYear}`;
</script>
</body>
</html>
